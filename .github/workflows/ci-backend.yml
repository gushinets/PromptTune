name: CI Backend

on:
  push:
    branches: [main]
    paths: [backend/**]
  pull_request:
    paths: [backend/**]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prompttune
          POSTGRES_PASSWORD: prompttune
          POSTGRES_DB: prompttune_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U prompttune"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest
        env:
          DATABASE_URL: postgresql+asyncpg://prompttune:prompttune@localhost:5432/prompttune_test
          REDIS_URL: redis://localhost:6379/0
