services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    volumes:
      - ../backend/app:/app/app
    environment:
      - UVICORN_RELOAD=true
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
