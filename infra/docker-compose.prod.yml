services:
  api:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
    networks:
      - prompttune

volumes:
  caddy-data:
  caddy-config:
